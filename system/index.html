<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WebOS Desktop</title>
    <style>
        body { 
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a237e 0%, #0288d1 100%);
            height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }
        #desktop { flex: 1; position: relative; }
        /* --- Launcher (Start Menu) --- */
        #launcher {
            position: absolute; bottom: 60px; left: 10px; width: 320px; height: 400px;
            background: rgba(32, 33, 36, 0.95); backdrop-filter: blur(15px);
            border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            display: none; flex-direction: column; padding: 15px; z-index: 10000;
        }
        #launcher.active { display: flex; }
        .search-box { background: rgba(255,255,255,0.1); border-radius: 20px; padding: 8px 15px; }
        #launcher-search { background: none; border: none; color: white; width: 100%; outline: none; }
        .app-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
        .launcher-app { display: flex; flex-direction: column; align-items: center; color: white; cursor: pointer; }
        .app-icon { width: 40px; height: 40px; background: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        /* Taskbar */
        #taskbar { height: 48px; background: rgba(32, 33, 36, 0.95); display: flex; align-items: center; padding: 0 15px; }
        #start-btn { width: 32px; height: 32px; background: white; border-radius: 50%; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div id="desktop">
        <div id="launcher">
            <div class="search-box"><input type="text" id="launcher-search" placeholder="Search..."></div>
            <div class="app-grid">
                <div class="launcher-app" onclick="toggleLauncher()"><div class="app-icon">🌐</div><span>Browser</span></div>
            </div>
        </div>
    </div>
    <div id="taskbar"><button id="start-btn" onclick="toggleLauncher()"></button></div>
    <script>
        const launcher = document.getElementById('launcher');
        function toggleLauncher() { launcher.classList.toggle('active'); }
        document.getElementById('desktop').addEventListener('click', (e) => {
            if (e.target.id === 'desktop') launcher.classList.remove('active');
        });
    </script>
</body>
</html>
