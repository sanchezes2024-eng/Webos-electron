<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WebOS Desktop</title>
    <style>
        body { 
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #3f51b5;
            background-image: linear-gradient(135deg, #1a237e 0%, #0288d1 100%);
            height: 100vh; width: 100vw;
            overflow: hidden;
            display: flex; flex-direction: column;
        }

        #desktop {
            flex: 1;
            position: relative; /* Essential for floating windows */
            width: 100%;
        }

        /* --- Floating Window Styles --- */
        .window {
            position: absolute;
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            min-width: 300px;
            min-height: 200px;
            overflow: hidden;
            z-index: 1;
        }

        /* The Titlebar (The part you grab to drag) */
        .titlebar {
            height: 35px;
            background: #f1f3f4;
            display: flex;
            align-items: center;
            padding: 0 10px;
            cursor: move; /* Shows the "Grab" icon */
            user-select: none;
            border-bottom: 1px solid #d1d1d1;
        }

        .title-text { flex: 1; font-size: 12px; color: #5f6368; font-weight: bold; }

        .win-controls button {
            border: none; background: none; padding: 5px 8px;
            cursor: pointer; border-radius: 4px;
        }
        .win-controls button:hover { background: #e8eaed; }
        .close-btn:hover { background: #d93025 !important; color: white; }

        .content { flex: 1; display: flex; flex-direction: column; position: relative; }
        
        /* Browser specific styles */
        .address-bar { padding: 5px; background: #f1f3f4; display: flex; gap: 5px; }
        #url-input { flex: 1; border-radius: 10px; border: 1px solid #ccc; padding: 2px 10px; font-size: 12px; }
        webview { width: 100%; height: 100%; background: white; }

        /* --- Taskbar --- */
        #taskbar {
            height: 48px;
            background: rgba(32, 33, 36, 0.9);
            display: flex; align-items: center; padding: 0 15px;
            z-index: 9999; /* Always stay on top */
        }
        #start-btn { width: 32px; height: 32px; background: white; border-radius: 50%; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div id="desktop">
        <!-- Browser Window -->
        <div class="window" id="browser-win" style="width: 800px; height: 500px; left: 50px; top: 50px;">
            <div class="titlebar">
                <span class="title-text">🌐 Web Browser</span>
                <div class="win-controls">
                    <button class="close-btn">✕</button>
                </div>
            </div>
            <div class="content">
                <div class="address-bar">
                    <input type="text" id="url-input" value="https://www.google.com">
                </div>
                <webview id="browser-view" src="https://www.google.com"></webview>
            </div>
        </div>

        <!-- File Explorer Window -->
        <div class="window" id="files-win" style="width: 300px; height: 400px; left: 900px; top: 100px;">
            <div class="titlebar">
                <span class="title-text">📁 Files</span>
                <div class="win-controls">
                    <button class="close-btn">✕</button>
                </div>
            </div>
            <div class="content" style="background: #292a2d; color: white; padding: 10px;">
                <ul id="file-list" style="list-style: none; padding: 0;"></ul>
            </div>
        </div>
    </div>

    <div id="taskbar">
        <button id="start-btn"></button>
    </div>

    <script>
        // --- DRAG LOGIC ---
        function makeDraggable(winElement) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            const titlebar = winElement.querySelector(".titlebar");

            titlebar.onmousedown = dragMouseDown;

            function dragMouseDown(e) {
                // Focus window (Bring to front)
                document.querySelectorAll('.window').forEach(w => w.style.zStatus = 1);
                winElement.style.zIndex = 100;

                e.preventDefault();
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
            }

            function elementDrag(e) {
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                winElement.style.top = (winElement.offsetTop - pos2) + "px";
                winElement.style.left = (winElement.offsetLeft - pos1) + "px";
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
            }
        }

        // Apply drag logic to all windows
        document.querySelectorAll('.window').forEach(makeDraggable);

        // --- BROWSER LOGIC ---
        const webview = document.getElementById('browser-view');
        const urlInput = document.getElementById('url-input');
        urlInput.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') webview.loadURL(urlInput.value.includes('://') ? urlInput.value : 'https://' + urlInput.value);
        });

        // --- FILE SYSTEM REFRESH ---
        async function refreshFS() {
            const files = await window.api.getFiles(window.api.user);
            document.getElementById('file-list').innerHTML = files.map(f => `<li>${f.isDir ? '📁' : '📄'} ${f.name}</li>`).join('');
        }
        refreshFS();
    </script>
</body>
</html>
